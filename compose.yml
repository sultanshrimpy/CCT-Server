name: stoat

services:
  # MongoDB: Database
  database:
    image: docker.io/mongo
    restart: always
    volumes:
      - ./data/db:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis: Event message broker & KV store
  redis:
    image: docker.io/eqalpha/keydb
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ: Internal message broker
  rabbit:
    image: docker.io/rabbitmq:4-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  # MinIO: S3-compatible storage server
  minio:
    image: docker.io/minio/minio
    command: server /data
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: minioautumn
      MINIO_ROOT_PASSWORD: minioautumn
      MINIO_DOMAIN: minio
    networks:
      default:
        aliases:
          - revolt-uploads.minio
          # legacy support:
          - attachments.minio
          - avatars.minio
          - backgrounds.minio
          - icons.minio
          - banners.minio
          - emojis.minio
    restart: always

  # Caddy: Web server
  caddy:
    image: docker.io/caddy
    restart: always
    env_file: .env.web
    ports:
      - "88:80"
      - "448:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy-data:/data
      - ./data/caddy-config:/config
    networks:
      default:
        aliases:
          - cct.wtf

  # API server
  api:
    image: ghcr.io/stoatchat/api:v0.13.5
    extra_hosts:
      - "cct.wtf:172.18.0.1"
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Events service
  events:
    image: ghcr.io/stoatchat/events:v0.13.5
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # File server
  autumn:
    image: ghcr.io/stoatchat/file-server:v0.13.5
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      createbuckets:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Metadata and image proxy
  january:
    image: ghcr.io/stoatchat/proxy:v0.13.5
    env_file: secrets.env
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: always

  gifbox:
    image: ghcr.io/stoatchat/gifbox:v0.13.5
    env_file: secrets.env
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Regular task daemon
  crond:
    image: ghcr.io/stoatchat/crond:v0.13.5
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      rabbit-init:
        condition: service_completed_successfully
      minio:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Push notification daemon
  pushd:
    image: ghcr.io/stoatchat/pushd:v0.13.5
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml
    restart: always

  # Voice ingress daemon
  voice-ingress:
    image: ghcr.io/stoatchat/voice-ingress:latest
    env_file: secrets.env
    restart: on-failure
    depends_on:
      rabbit-init:
        condition: service_completed_successfully
      database:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - type: bind
        source: ./Revolt.toml
        target: /Revolt.toml

  livekit:
    image: ghcr.io/stoatchat/livekit-server:v1.9.13
    depends_on:
      redis:
        condition: service_healthy
    command: --config /etc/livekit.yml
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "3478:3478/udp"
      - "50000-50100:50000-50100/udp"
    restart: always
    volumes:
      - type: bind
        source: ./livekit.yml
        target: /etc/livekit.yml

  # Create buckets for minio.
  createbuckets:
    image: docker.io/minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      while ! /usr/bin/mc ready minio; do
        /usr/bin/mc alias set minio http://minio:9000 minioautumn minioautumn;
        echo 'Waiting minio...' && sleep 1;
      done;
      /usr/bin/mc mb minio/revolt-uploads;
      exit 0;
      "

  # Web App
  web:
    image: cct-frontend
    restart: always
    env_file: .env.web

  stage-bridge:
    build:
      context: ./stage-bridge
    restart: always
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=fe2acd880f5f
      - LIVEKIT_API_SECRET=962afc05bf11b1ac44f7613824f125f3f94a9c60edef848d
      - REDIS_URL=redis://redis:6379
      - PORT=8600
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy

  dicebot:
    build: /root/dicebot/dicebot
    restart: unless-stopped
    environment:
      - REVOLT_BOT_TOKEN=TGgvBOI7I73x7SM1R0W4Zawf45ITglnsu-kAlKZp3RpHrnhZfhzQLcv-MqmL44aR
      - REVOLT_API_URL=https://cct.wtf/api
    depends_on:
      - api


  rabbit-init:
    image: curlimages/curl
    depends_on:
      rabbit:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        curl -sf -u rabbituser:rabbitpass -X PUT http://rabbit:15672/api/exchanges/%2F/revolt.default -H 'Content-Type: application/json' -d '{\"type\":\"topic\",\"durable\":true}' &&
        curl -sf -u rabbituser:rabbitpass -X PUT http://rabbit:15672/api/queues/%2F/internal.ack-prd -H 'Content-Type: application/json' -d '{\"durable\":true}' &&
        curl -sf -u rabbituser:rabbitpass -X POST http://rabbit:15672/api/bindings/%2F/e/revolt.default/q/internal.ack-prd -H 'Content-Type: application/json' -d '{\"routing_key\":\"internal.ack-prd\"}' &&
        echo 'RabbitMQ init complete'
      "


  ack-processor:
    build:
      context: ./ack-processor
    restart: always
    environment:
      - AMQP_URL=amqp://rabbituser:rabbitpass@rabbit:5672/
      - MONGO_URL=mongodb://database:27017
      - MONGO_DB=revolt
      - QUEUE_NAME=internal.ack-prd
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
      rabbit-init:
        condition: service_completed_successfully
